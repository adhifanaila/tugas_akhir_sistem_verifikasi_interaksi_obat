<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Sistem Verifikasi Obat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background elements */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: float 20s ease-in-out infinite;
      z-index: 1;
    }

    .background-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .shape1 {
      width: 200px;
      height: 200px;
      top: 20%;
      left: 10%;
      animation: floatShape1 15s ease-in-out infinite;
    }

    .shape2 {
      width: 150px;
      height: 150px;
      top: 60%;
      right: 15%;
      animation: floatShape2 12s ease-in-out infinite;
    }

    .shape3 {
      width: 100px;
      height: 100px;
      top: 30%;
      right: 30%;
      animation: floatShape3 18s ease-in-out infinite;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 440px;
      animation: slideInUp 0.8s ease-out;
      position: relative;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-header::before {
      content: '🏥';
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      animation: pulse 2s ease-in-out infinite;
    }

    .login-container h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .form-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
      transition: color 0.3s ease;
    }

    .input-wrapper {
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.3s ease;
      outline: none;
    }

    .form-group input:focus {
      border-color: #667eea;
      background: rgba(255, 255, 255, 1);
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      transform: translateY(-2px);
    }

    .form-group input:focus + .input-icon {
      color: #667eea;
      transform: scale(1.1);
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      margin-top: 1rem;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .forgot-password {
      text-align: center;
      margin-top: 1.5rem;
    }

    .forgot-password a {
      color: #667eea;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .forgot-password a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    /* Animations */
    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    @keyframes floatShape1 {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      33% { transform: translateY(-30px) translateX(20px); }
      66% { transform: translateY(20px) translateX(-10px); }
    }

    @keyframes floatShape2 {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-40px) translateX(-30px); }
    }

    @keyframes floatShape3 {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      25% { transform: translateY(30px) translateX(20px); }
      75% { transform: translateY(-20px) translateX(-15px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* Mobile responsive */
    @media (max-width: 480px) {
      .login-container {
        padding: 2rem;
        margin: 1rem;
        border-radius: 16px;
      }

      .login-container h1 {
        font-size: 1.7rem;
      }

      .form-group input {
        padding: 0.9rem 0.9rem 0.9rem 2.5rem;
      }

      .input-icon {
        left: 0.8rem;
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background shapes -->
  <div class="background-shapes">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
  </div>

  <main class="login-container">
    <div class="login-header">
      <h1>Sistem Verifikasi Obat</h1>
      <p class="subtitle">Masuk ke akun Anda untuk melanjutkan</p>
    </div>
    
    <form action="proses-login.php" method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <input id="username" name="username" type="text" required placeholder="Masukkan username Anda" />
          <div class="input-icon">👤</div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input id="password" name="password" type="password" required placeholder="Masukkan password Anda" />
          <div class="input-icon">🔒</div>
        </div>
      </div>

      <button type="submit" class="login-btn">Masuk ke Sistem</button>
    </form>

    <div class="forgot-password">
      <a href="#" onclick="alert('Hubungi administrator untuk reset password')">Lupa password?</a>
    </div>
  </main>

  <script>
    // Add some interactivity
    document.addEventListener('DOMContentLoaded', function() {
      // Focus animation for inputs
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('focus', function() {
          this.parentNode.parentNode.querySelector('label').style.color = '#667eea';
        });
        
        input.addEventListener('blur', function() {
          this.parentNode.parentNode.querySelector('label').style.color = '#333';
        });
      });

      // Loading animation on form submit
      const form = document.querySelector('form');
      const loginBtn = document.querySelector('.login-btn');
      
      form.addEventListener('submit', function(e) {
        loginBtn.innerHTML = '🔄 Memproses...';
        loginBtn.disabled = true;
        
        // Remove this setTimeout in production - it's just for demo
        setTimeout(() => {
          loginBtn.innerHTML = 'Masuk ke Sistem';
          loginBtn.disabled = false;
        }, 3000);
      });

      // Add particle effect on click
      loginBtn.addEventListener('click', function(e) {
        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const ripple = document.createElement('span');
        ripple.style.cssText = `
          position: absolute;
          left: ${x}px;
          top: ${y}px;
          width: 0;
          height: 0;
          border-radius: 50%;
          background: rgba(255,255,255,0.5);
          transform: translate(-50%, -50%);
          animation: ripple 0.6s ease-out;
        `;
        
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });

      // Add ripple animation style
      const style = document.createElement('style');
      style.textContent = `
        @keyframes ripple {
          to {
            width: 300px;
            height: 300px;
            opacity: 0;
          }
        }
      `;
      document.head.appendChild(style);
    });
  </script>
</body>
</html>
