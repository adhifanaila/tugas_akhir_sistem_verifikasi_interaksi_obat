<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Resep Dokter</title>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<body>
  <nav>
    <div class="nav-container">
      <div class="nav-left">
        <a href="dashboard-dokter.php" class="profile-icon">⬅ Back</a>
      </div>
    </div>
  </nav>

  <div class="form-container">
    <h1>Input Resep Obat</h1>

    <form action="proses-resep.php" method="POST">
      <div class="patient-info-container">
        <h2>Informasi Pasien</h2>
        <div class="patient-info-row">
          <label for="nama">Nama Pasien</label>
          <input type="text" id="nama" name="nama" placeholder="Masukkan nama pasien" required />
        </div>

        <div class="patient-info-row">
          <label for="tanggal_lahir">Tanggal Lahir Pasien</label>
          <input type="date" id="tanggal_lahir" name="tanggal_lahir" required />
        </div>

        <div class="patient-info-row">
          <label for="usia">Usia Pasien</label>
          <input type="text" id="usia" name="usia" placeholder="Usia otomatis" readonly />
        </div>

        <div class="patient-info-row">
          <label for="alamat">Alamat</label>
          <input type="text" id="alamat" name="alamat" placeholder="Masukkan alamat pasien" required />
        </div>

        <div class="patient-info-row">
          <label for="diagnosis">Diagnosis Pasien</label>
          <textarea id="diagnosis" name="diagnosis" placeholder="Masukkan diagnosis pokok" required></textarea>
        </div>
      </div>

      <div class="resep-container">
        <h2>Input Resep Obat</h2>
        <div class="resep-row">
          <label for="tanggal"><h3>Tanggal Resep</h3></label>
          <input type="date" id="tanggal" name="tanggal" required />
        </div>

        <div id="obat-container">
          <div class="obat-row">
            <label>Nama Obat</label>
            <select name="obat[]" class="select-obat" required>
              <option value="">Pilih Obat</option>
              <option value="1">Obat 1</option>
              <option value="2">Obat 2</option>
              <option value="3">Obat 3</option>
            </select>
            <label>Dosis</label>
            <input type="text" name="dosis[]" placeholder="Masukkan dosis" required />
            <label>Aturan Pakai</label>
            <input type="text" name="aturanpakai[]" placeholder="Masukkan aturan pakai obat" required />
          </div>
        </div>

        <button type="button" id="add-row">+ Tambah Baris</button>

      <div class="patient-info-row">
        <label for="catatan"><h3>Catatan Lainnya</h3></label>
        <textarea id="catatan" name="catatan" placeholder="Masukkan catatan lainnya..."></textarea>
      </div>
  
        <button type="submit">Cek Interaksi</button>
      </div>
    </form>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('tanggal').value = today;

      const tanggalLahirInput = document.getElementById('tanggal_lahir');
      const usiaInput = document.getElementById('usia');

      tanggalLahirInput.addEventListener('change', function () {
        const birthDate = new Date(this.value);
        const today = new Date();
        if (isNaN(birthDate.getTime())) {
          usiaInput.value = '';
          return;
        }
        let years = today.getFullYear() - birthDate.getFullYear();
        let months = today.getMonth() - birthDate.getMonth();
        if (today.getDate() < birthDate.getDate()) {
          months--;
        }
        if (months < 0) {
          years--;
          months += 12;
        }
        usiaInput.value = `${years} tahun ${months} bulan`;
      });

      $('.select-obat').select2({
        placeholder: "Pilih Obat",
        allowClear: true
      });

      $('#add-row').click(function () {
        const newRow = `
          <div class="obat-row">
            <label>Nama Obat</label>
            <select name="obat[]" class="select-obat" required>
              <option value="">Pilih Obat</option>
              <option value="1">Obat 1</option>
              <option value="2">Obat 2</option>
              <option value="3">Obat 3</option>
            </select>
            <label>Dosis</label>
            <input type="text" name="dosis[]" placeholder="Masukkan dosis" required />
            <label>Aturan Pakai</label>
            <input type="text" name="aturanpakai[]" placeholder="Masukkan aturan pakai obat" required />
          </div>
        `;
        $('#obat-container').append(newRow);
        $('#obat-container').find('select.select-obat').last().select2({
          placeholder: "Pilih Obat",
          allowClear: true
        });
      });
    });
  </script>
